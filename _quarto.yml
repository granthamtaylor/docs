format:
  html:
    theme:
      light:
        - flatly
        - docs/assets/stylesheets/theme-light.scss
      dark:
        - darkly
        - docs/assets/stylesheets/theme-dark.scss
    toc: true
    code-copy: true
    code-overflow: scroll
    respect-user-color-scheme: true
    css:
      - docs/assets/stylesheets/quartodoc.css
      - docs/assets/stylesheets/quarto-marimo.css
