project:
  type: website
  output-dir: site
  render:
    - index.qmd
    - docs/**/*.qmd

quartodoc:
  package: json2vec
  style: pkgdown
  dir: docs/reference
  out_index: api.qmd
  title: "API Reference"
  parser: google
  css: docs/assets/stylesheets/quartodoc.css
  options:
    signature_name: short
    include_empty: true
    member_order: source
  sections:
    - title: Package
      desc: Public constructors, helpers, enums, callbacks, and extension base classes exported by `json2vec`.
      package:
      contents:
        - name: json2vec
          children: embedded
          include_imports: true
          members:
            - Model
            - Array
            - Mask
            - Number
            - Category
            - Set
            - DateParts
            - Entity
            - Vector
            - Text
            - CustomDataModule
            - PolarsDataModule
            - StreamingDataModule
            - Writer
            - Postprocessor
            - preprocess
            - where
            - Overflow
            - TensorKey
            - Address
            - Hyperparameters
            - TensorFieldBase
            - RequestBase
            - EmbedderBase
            - DecoderBase
            - Plugin
    - title: Model
      contents:
        - name: Model
          members:
            - from_schema
            - select
            - update
            - extend
            - delete
            - reset
            - override
            - save
            - load
            - predict
    - title: Schema
      contents:
        - Array
        - Mask
        - name: Hyperparameters
          members:
            - from_schema
            - target
            - embed
            - select
            - update
            - extend
            - delete
            - override
        - where
    - title: Tensorfield Constructors
      contents:
        - Number
        - Category
        - Set
        - DateParts
        - Entity
        - Vector
        - Text
    - title: Data
      contents:
        - name: CustomDataModule
          members:
            - dataloader
            - train_dataloader
            - val_dataloader
            - test_dataloader
            - predict_dataloader
        - name: PolarsDataModule
          members:
            - dataloader
            - train_dataloader
            - val_dataloader
            - test_dataloader
            - predict_dataloader
        - name: StreamingDataModule
          members:
            - dataloader
            - train_dataloader
            - val_dataloader
            - test_dataloader
            - predict_dataloader
    - title: Batch Inference
      contents:
        - Writer
        - Postprocessor
    - title: Preprocessing
      contents:
        - preprocess
        - name: Preprocessor
          members:
            - outputs

