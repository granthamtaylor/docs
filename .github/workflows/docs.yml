name: Build docs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Render Quarto site
    runs-on: ubuntu-latest

    steps:
      - name: Check out docs
        uses: actions/checkout@v4

      - name: Check out json2vec source
        uses: actions/checkout@v4
        with:
          repository: granthamtaylor/json2vec-oss
          path: json2vec-oss
          token: ${{ secrets.JSON2VEC_OSS_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Patch local source paths for CI
        run: |
          python - <<'PY'
          from pathlib import Path

          workspace = Path.cwd()
          source = workspace / "json2vec-oss"
          replacements = {
              "file:///Users/grantham/Desktop/json2vec-oss": f"file://{source}",
              "/Users/grantham/Desktop/json2vec-oss/src": str(source / "src"),
          }

          for path in [Path("_quarto.yml"), *Path("docs").rglob("*.qmd"), Path("index.qmd")]:
              text = path.read_text()
              updated = text
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated)
          PY

      - name: Render docs
        run: make render

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
